<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Wardrobe">
<title>My Wardrobe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --green:#3B6D11;--green-bg:#EAF3DE;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --r-md:8px;--r-lg:12px;--r-xl:16px;
  --ff-head:'Playfair Display',serif;--ff-body:'DM Sans',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--text:#f0efe9;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--green-bg:#173404;--blue-bg:#042C53;}
}
html,body{height:100%;font-family:var(--ff-body);background:var(--bg);color:var(--text);overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.header h1{font-family:var(--ff-head);font-size:22px;font-weight:400;color:var(--text)}
.header-count{font-size:12px;color:var(--text3);background:var(--bg2);padding:4px 10px;border-radius:99px;border:0.5px solid var(--border)}
.tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;margin-top:12px}
.tab{flex:1;padding:13px 6px;font-size:12px;font-family:var(--ff-body);font-weight:400;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--text);border-bottom:2px solid var(--text);font-weight:500}
.section{display:none;padding:16px;flex:1}
.section.active{display:block}
button{font-family:var(--ff-body);cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text);border-radius:var(--r-md);transition:all .15s}
button:active{transform:scale(0.97)}
.btn-primary{background:var(--text)!important;color:var(--bg)!important;border-color:var(--text)!important}
.btn-accent{background:var(--blue)!important;color:var(--blue-bg)!important;border-color:var(--blue)!important}
input,select{font-family:var(--ff-body);font-size:13px;color:var(--text);background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r-md);padding:0 10px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--text)}
select option{background:var(--bg);color:var(--text)}
.top-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.top-bar button{height:38px;padding:0 14px;font-size:12px;white-space:nowrap}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.cat-filter::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 13px;border-radius:99px;font-size:12px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:var(--ff-body);transition:all .15px;white-space:nowrap;flex-shrink:0}
.cat-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.summary-bar{background:var(--bg2);border-radius:var(--r-md);padding:9px 12px;font-size:11px;color:var(--text2);margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;overflow-x:auto}
.summary-bar::-webkit-scrollbar{display:none}
.summary-bar span{color:var(--text);font-weight:500}
.clothes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:10px}
.cloth-card{border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;position:relative;background:var(--bg)}
.cloth-img{width:100%;aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden}
.cloth-img img{width:100%;height:100%;object-fit:cover}
.cloth-info{padding:7px 8px}
.cloth-name{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cloth-cat{font-size:10px;color:var(--text2);margin-top:1px}
.worn-badge{position:absolute;top:5px;right:5px;background:var(--green);color:var(--green-bg);font-size:9px;padding:2px 5px;border-radius:99px}
.del-btn{position:absolute;top:5px;left:5px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.empty-state .big{font-size:36px;margin-bottom:10px}
.bulk-drop{border:1.5px dashed var(--border2);border-radius:var(--r-lg);padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.bulk-drop.drag-over{border-color:var(--text);background:var(--bg2)}
.drop-icon{width:44px;height:44px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px}
.bulk-drop h3{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px}
.bulk-drop p{font-size:12px;color:var(--text2);margin-bottom:3px}
.bulk-drop small{font-size:11px;color:var(--text3)}
.progress-wrap{margin-bottom:14px}
.progress-track{background:var(--bg2);border-radius:99px;height:4px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:4px;background:var(--blue);border-radius:99px;transition:width .4s;width:0%}
.progress-label{font-size:11px;color:var(--text2)}
.bulk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.bulk-item{border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--bg);position:relative}
.bulk-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--bg2)}
.bulk-body{padding:8px}
.bulk-body input,.bulk-body select{height:28px;font-size:11px;margin-bottom:5px}
.bulk-status{display:flex;align-items:center;gap:5px;padding-top:3px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.pending{background:var(--border2)}
.sdot.analyzing{background:#EF9F27;animation:blink .8s infinite}
.sdot.done{background:var(--green)}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.slabel{font-size:10px;color:var(--text3)}
.bulk-remove{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.bulk-actions{display:flex;gap:8px}
.bulk-actions button{flex:1;height:40px;font-size:13px}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-wrap.open{display:flex}
.modal{background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 16px 32px;width:100%;max-width:480px;border-top:0.5px solid var(--border)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 16px}
.modal h3{font-family:var(--ff-head);font-size:17px;font-weight:400;margin-bottom:14px}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.form-row input,.form-row select{height:38px}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--r-md);padding:20px;text-align:center;cursor:pointer;margin-bottom:12px}
.upload-zone p{font-size:13px;color:var(--text2)}
.upload-zone small{font-size:11px;color:var(--text3)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;height:40px;font-size:13px}
.context-card{background:var(--bg2);border-radius:var(--r-lg);padding:14px;margin-bottom:14px}
.ctx-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ctx-row:last-child{margin-bottom:0}
.ctx-row label{font-size:12px;color:var(--text2);width:76px;flex-shrink:0}
.ctx-row select{flex:1;height:32px;font-size:12px}
.suggest-btn{width:100%;height:44px;font-family:var(--ff-head);font-size:16px;margin-bottom:16px;border-radius:var(--r-lg)}
.outfit-card{border:0.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:14px;background:var(--bg)}
.outfit-head{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.outfit-title{font-family:var(--ff-head);font-size:16px;font-weight:400}
.outfit-score{font-size:11px;color:var(--text2);background:var(--bg2);padding:3px 9px;border-radius:99px}
.outfit-pieces{display:flex;gap:10px;padding:14px;overflow-x:auto}
.outfit-pieces::-webkit-scrollbar{display:none}
.piece{flex-shrink:0;width:80px;text-align:center}
.piece-img{width:72px;height:72px;border-radius:var(--r-md);background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 5px;overflow:hidden}
.piece-img img{width:100%;height:100%;object-fit:cover}
.piece-name{font-size:10px;color:var(--text2);line-height:1.3}
.outfit-reason{padding:10px 16px;font-size:12px;color:var(--text2);border-top:0.5px solid var(--border);line-height:1.6;font-style:italic}
.outfit-nav{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-top:0.5px solid var(--border)}
.dot-row{display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background .2s}
.dot.active{background:var(--text)}
.nav-arrows{display:flex;gap:6px}
.nav-arrows button{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--bg2)}
.worn-btn{width:100%;height:38px;font-size:13px;border-radius:var(--r-md)}
.ai-loading{text-align:center;padding:32px;color:var(--text2);font-size:13px}
.ai-loading p{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.error-box{background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--r-lg);padding:14px 16px;font-size:13px;color:#A32D2D;margin-bottom:14px;line-height:1.5}
.history-item{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--border)}
.hist-date{font-size:11px;color:var(--text2);width:62px;flex-shrink:0;line-height:1.4}
.hist-pieces{display:flex;gap:5px;flex:1}
.hist-thumb{width:34px;height:34px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;overflow:hidden}
.hist-thumb img{width:100%;height:100%;object-fit:cover}
.hist-name{font-size:10px;color:var(--green);background:var(--green-bg);padding:2px 7px;border-radius:99px;margin-left:auto;flex-shrink:0;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:13px;z-index:999;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>My Wardrobe</h1>
    <span class="header-count" id="header-count">0 items</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('wardrobe')">Wardrobe</button>
    <button class="tab" onclick="switchTab('bulk')">Bulk add</button>
    <button class="tab" onclick="switchTab('suggest')">Outfit</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <div id="tab-wardrobe" class="section active">
    <div class="top-bar">
      <button class="btn-primary" onclick="openAddModal()" style="padding:0 14px;height:38px;font-size:12px">+ Add item</button>
      <button class="btn-accent" onclick="switchTab('bulk')" style="padding:0 14px;height:38px;font-size:12px">Bulk add</button>
    </div>
    <div class="cat-filter">
      <button class="cat-btn active" onclick="filterCat('all',this)">All</button>
      <button class="cat-btn" onclick="filterCat('Tops',this)">Tops</button>
      <button class="cat-btn" onclick="filterCat('Bottoms',this)">Bottoms</button>
      <button class="cat-btn" onclick="filterCat('Shoes',this)">Shoes</button>
      <button class="cat-btn" onclick="filterCat('Jackets',this)">Jackets</button>
      <button class="cat-btn" onclick="filterCat('Accessories',this)">Accessories</button>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="clothes-grid" id="clothes-grid"></div>
  </div>

  <div id="tab-bulk" class="section">
    <div class="bulk-drop" id="drop-zone" onclick="document.getElementById('bulk-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <input type="file" id="bulk-input" accept="image/*" multiple style="display:none" onchange="handleBulkFiles(event.target.files)">
      <div class="drop-icon">📁</div>
      <h3>Add multiple clothes at once</h3>
      <p>Tap to select photos from your camera roll</p>
      <small>AI will auto-detect name, category & color</small>
    </div>
    <div id="progress-wrap" class="progress-wrap" style="display:none">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <p class="progress-label" id="progress-label"></p>
    </div>
    <div class="bulk-grid" id="bulk-grid"></div>
    <div class="bulk-actions" id="bulk-actions" style="display:none">
      <button onclick="clearBulk()">Clear all</button>
      <button class="btn-primary" onclick="confirmBulk()">Save all to wardrobe</button>
    </div>
  </div>

  <div id="tab-suggest" class="section">
    <div class="context-card">
      <div class="ctx-row"><label>Occasion</label><select id="ctx-occasion"><option>Work / Office</option><option>Casual day out</option><option>Evening / dinner</option><option>Weekend at home</option><option>Formal event</option></select></div>
      <div class="ctx-row"><label>Weather</label><select id="ctx-weather"><option>Hot & sunny</option><option>Warm & mild</option><option>Cool & breezy</option><option>Cold</option><option>Rainy</option></select></div>
      <div class="ctx-row"><label>Mood</label><select id="ctx-mood"><option>Minimal & clean</option><option>Bold & expressive</option><option>Comfortable & easy</option><option>Smart & put-together</option></select></div>
    </div>
    <button class="suggest-btn btn-primary" onclick="generateOutfits()">Suggest outfit for today</button>
    <div id="outfit-area"></div>
  </div>

  <div id="tab-history" class="section">
    <div id="history-list"></div>
  </div>
</div>

<div class="modal-wrap" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Add clothing item</h3>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleSingleFile(event)">
      <div id="preview-wrap"><p>Tap to choose photo</p><small>from your camera roll</small></div>
    </div>
    <div class="form-row"><label>Name</label><input type="text" id="item-name" placeholder="e.g. White linen shirt"></div>
    <div class="form-row"><label>Category</label><select id="item-cat"><option>Tops</option><option>Bottoms</option><option>Shoes</option><option>Jackets</option><option>Accessories</option></select></div>
    <div class="form-row"><label>Color</label><input type="text" id="item-color" placeholder="e.g. White, Navy, Olive..."></div>
    <div class="modal-btns">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveItem()">Add to wardrobe</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GEMINI_KEY='AIzaSyB9z8iEw1TkZm8JWkFzMdUC2PSwRhwzpH4';
const GEMINI_TEXT_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_KEY;
const GEMINI_VIS_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_KEY;

const EMOJIS={Tops:'👕',Bottoms:'👖',Shoes:'👟',Jackets:'🧥',Accessories:'👜'};
const STORAGE_KEY='wardrobe_v1';
const HISTORY_KEY='wardrobe_history_v1';

function loadWardrobe(){try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):[];}catch(e){return [];}}
function saveWardrobe(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(wardrobe));}catch(e){}}
function loadHistory(){try{const d=localStorage.getItem(HISTORY_KEY);return d?JSON.parse(d):[];}catch(e){return [];}}
function saveHistory(){try{localStorage.setItem(HISTORY_KEY,JSON.stringify(history));}catch(e){}}

let wardrobe=loadWardrobe();
let history=loadHistory();
let idCtr=wardrobe.length?Math.max(...wardrobe.map(i=>i.id)):0;
let currentCat='all';
let outfits=[];
let outfitIdx=0;
let bulkItems=[];
let analyzing=false;
let uploadedImg=null;

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function switchTab(t){
  const tabs=['wardrobe','bulk','suggest','history'];
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',tabs[i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='history') renderHistory();
  if(t==='wardrobe') renderWardrobe();
}

function filterCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderWardrobe();
}

function renderWardrobe(){
  const g=document.getElementById('clothes-grid');
  const sb=document.getElementById('summary-bar');
  const hc=document.getElementById('header-count');
  const cats={Tops:0,Bottoms:0,Shoes:0,Jackets:0,Accessories:0};
  wardrobe.forEach(i=>{if(cats[i.cat]!==undefined)cats[i.cat]++;});
  hc.textContent=wardrobe.length+' items';
  sb.innerHTML=`All <span>${wardrobe.length}</span> &nbsp;·&nbsp; Tops <span>${cats.Tops}</span> &nbsp;·&nbsp; Bottoms <span>${cats.Bottoms}</span> &nbsp;·&nbsp; Shoes <span>${cats.Shoes}</span> &nbsp;·&nbsp; Jackets <span>${cats.Jackets}</span>`;
  const items=currentCat==='all'?wardrobe:wardrobe.filter(i=>i.cat===currentCat);
  if(!items.length){g.innerHTML='<div class="empty-state"><div class="big">👗</div>No items here yet.<br>Tap "+ Add item" to start.</div>';return;}
  g.innerHTML=items.map(item=>`
    <div class="cloth-card">
      <button class="del-btn" onclick="deleteItem(${item.id})">×</button>
      <div class="cloth-img">${item.img?`<img src="${item.img}" loading="lazy">`:`<span style="font-size:34px">${item.emoji||EMOJIS[item.cat]||'👕'}</span>`}</div>
      ${item.worn&&item.worn.length?`<span class="worn-badge">${item.worn.length}×</span>`:''}
      <div class="cloth-info"><div class="cloth-name">${item.name}</div><div class="cloth-cat">${item.color} · ${item.cat}</div></div>
    </div>`).join('');
}

function deleteItem(id){
  if(!confirm('Remove this item?')) return;
  wardrobe=wardrobe.filter(i=>i.id!==id);
  saveWardrobe();renderWardrobe();toast('Item removed');
}

function openAddModal(){
  uploadedImg=null;
  document.getElementById('preview-wrap').innerHTML='<p>Tap to choose photo</p><small>from your camera roll</small>';
  document.getElementById('item-name').value='';
  document.getElementById('item-color').value='';
  document.getElementById('add-modal').classList.add('open');
}
function closeModal(){document.getElementById('add-modal').classList.remove('open');}

function handleSingleFile(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    uploadedImg=ev.target.result;
    document.getElementById('preview-wrap').innerHTML=`<img src="${uploadedImg}" style="width:80px;height:80px;object-fit:cover;border-radius:8px">`;
  };
  reader.readAsDataURL(file);
}

function saveItem(){
  const name=document.getElementById('item-name').value.trim();
  const cat=document.getElementById('item-cat').value;
  const color=document.getElementById('item-color').value.trim();
  if(!name){toast('Please enter a name');return;}
  wardrobe.push({id:++idCtr,name,cat,color:color||'Unknown',emoji:EMOJIS[cat],img:uploadedImg,worn:[]});
  saveWardrobe();closeModal();
  currentCat='all';
  document.querySelectorAll('.cat-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderWardrobe();toast('Item added!');
}

function onDragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('drag-over');}
function onDragLeave(){document.getElementById('drop-zone').classList.remove('drag-over');}
function onDrop(e){e.preventDefault();document.getElementById('drop-zone').classList.remove('drag-over');handleBulkFiles(e.dataTransfer.files);}

function handleBulkFiles(files){
  if(!files||!files.length) return;
  const arr=Array.from(files);let loaded=0;
  arr.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const id='b'+Date.now()+Math.random().toString(36).slice(2);
      bulkItems.push({id,name:'',cat:'Tops',color:'',img:ev.target.result,status:'pending'});
      loaded++;
      if(loaded===arr.length){renderBulkGrid();startAnalyzeQueue();}
    };
    reader.readAsDataURL(file);
  });
}

function renderBulkGrid(){
  const g=document.getElementById('bulk-grid');
  const act=document.getElementById('bulk-actions');
  if(!bulkItems.length){g.innerHTML='';act.style.display='none';return;}
  act.style.display='flex';
  g.innerHTML=bulkItems.map(item=>`
    <div class="bulk-item" id="bi-${item.id}">
      <img class="bulk-img" src="${item.img}" loading="lazy">
      <button class="bulk-remove" onclick="removeBulkItem('${item.id}')">×</button>
      <div class="bulk-body">
        <input type="text" id="bn-${item.id}" value="${item.name}" placeholder="Item name..." onchange="updateBulk('${item.id}','name',this.value)">
        <select id="bc-${item.id}" onchange="updateBulk('${item.id}','cat',this.value)">
          <option>Tops</option><option>Bottoms</option><option>Shoes</option><option>Jackets</option><option>Accessories</option>
        </select>
        <input type="text" id="bco-${item.id}" value="${item.color}" placeholder="Color..." onchange="updateBulk('${item.id}','color',this.value)">
        <div class="bulk-status"><span class="sdot ${item.status}" id="sd-${item.id}"></span><span class="slabel" id="sl-${item.id}">Waiting...</span></div>
      </div>
    </div>`).join('');
  updateProgress();
}

function updateBulk(id,field,val){const item=bulkItems.find(i=>i.id===id);if(item)item[field]=val;}
function removeBulkItem(id){bulkItems=bulkItems.filter(i=>i.id!==id);renderBulkGrid();}
function clearBulk(){bulkItems=[];renderBulkGrid();}

function confirmBulk(){
  const count=bulkItems.length;
  bulkItems.forEach(item=>{
    wardrobe.push({id:++idCtr,name:item.name||'Unnamed item',cat:item.cat,color:item.color||'Unknown',emoji:EMOJIS[item.cat],img:item.img,worn:[]});
  });
  saveWardrobe();bulkItems=[];renderBulkGrid();
  switchTab('wardrobe');
  setTimeout(()=>toast(`${count} items saved!`),300);
}

function updateProgress(){
  const done=bulkItems.filter(i=>i.status==='done').length;
  const total=bulkItems.length;
  const pw=document.getElementById('progress-wrap');
  const pf=document.getElementById('progress-fill');
  const pl=document.getElementById('progress-label');
  if(!total){pw.style.display='none';return;}
  pw.style.display='block';
  pf.style.width=Math.round(done/total*100)+'%';
  pl.textContent=done===total?`All ${total} items tagged — review & save`:`AI tagging: ${done} of ${total} done...`;
}

async function startAnalyzeQueue(){
  if(analyzing) return;
  analyzing=true;
  for(const item of bulkItems.filter(i=>i.status==='pending')){
    item.status='analyzing';
    const sd=document.getElementById('sd-'+item.id);
    const sl=document.getElementById('sl-'+item.id);
    if(sd) sd.className='sdot analyzing';
    if(sl) sl.textContent='Analyzing...';
    await analyzeImageGemini(item);
    item.status='done';
    const sd2=document.getElementById('sd-'+item.id);
    const sl2=document.getElementById('sl-'+item.id);
    if(sd2) sd2.className='sdot done';
    if(sl2) sl2.textContent='AI tagged';
    const bn=document.getElementById('bn-'+item.id);
    const bc=document.getElementById('bc-'+item.id);
    const bco=document.getElementById('bco-'+item.id);
    if(bn) bn.value=item.name;
    if(bc) bc.value=item.cat;
    if(bco) bco.value=item.color;
    updateProgress();
  }
  analyzing=false;
}

async function analyzeImageGemini(item){
  try{
    const base64=item.img.split(',')[1];
    const mtype=item.img.startsWith('data:image/png')?'image/png':item.img.startsWith('data:image/webp')?'image/webp':'image/jpeg';
    const resp=await fetch(GEMINI_VIS_URL,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[
          {inline_data:{mime_type:mtype,data:base64}},
          {text:'Identify this clothing item. Return ONLY valid JSON object, no markdown, no extra text:\n{"name":"short descriptive name","cat":"Tops or Bottoms or Shoes or Jackets or Accessories","color":"primary color"}'}
        ]}],
        generationConfig:{temperature:0.1,maxOutputTokens:150}
      })
    });
    const data=await resp.json();
    let raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
    raw=raw.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);
    item.name=parsed.name||'Clothing item';
    item.cat=['Tops','Bottoms','Shoes','Jackets','Accessories'].includes(parsed.cat)?parsed.cat:'Tops';
    item.color=parsed.color||'Unknown';
  }catch(e){
    item.name='Clothing item';item.cat='Tops';item.color='Unknown';
  }
}

async function generateOutfits(){
  const area=document.getElementById('outfit-area');
  if(wardrobe.length<2){
    area.innerHTML='<div class="empty-state">Add at least 2 items to your wardrobe first!</div>';
    return;
  }
  const occasion=document.getElementById('ctx-occasion').value;
  const weather=document.getElementById('ctx-weather').value;
  const mood=document.getElementById('ctx-mood').value;
  const recentlyWorn=wardrobe.filter(i=>i.worn&&i.worn.length>0).map(i=>i.name).join(', ')||'none';
  const wardrobeList=wardrobe.map(i=>`${i.name} (${i.cat}, ${i.color})`).join('; ');

  area.innerHTML='<div class="ai-loading"><p>Finding your best outfits...</p></div>';

  const prompt=`You are a personal stylist. Here is the wardrobe: ${wardrobeList}. Recently worn items to avoid repeating: ${recentlyWorn}. Today's occasion: ${occasion}. Weather: ${weather}. Mood: ${mood}. Suggest exactly 3 outfit combinations using only items from the wardrobe above. Focus on color coordination. Reply with ONLY a raw JSON array (no markdown, no backticks, no explanation): [{"title":"outfit name","score":"8","pieces":["exact item name 1","exact item name 2","exact item name 3"],"reason":"one sentence why this works for the occasion and weather"}]`;

  try{
    const resp=await fetch(GEMINI_TEXT_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.7,maxOutputTokens:800}
      })
    });

    if(!resp.ok){
      const err=await resp.json();
      throw new Error(err.error?.message||'API error '+resp.status);
    }

    const data=await resp.json();
    let raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    raw=raw.replace(/```json|```/g,'').trim();

    const start=raw.indexOf('[');
    const end=raw.lastIndexOf(']');
    if(start===-1||end===-1) throw new Error('No JSON array found in response');
    raw=raw.slice(start,end+1);

    outfits=JSON.parse(raw);
    if(!outfits.length) throw new Error('Empty outfits array');
    outfitIdx=0;
    renderOutfit();
    history.unshift({date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'}),outfit:outfits[0]});
    if(history.length>50) history=history.slice(0,50);
    saveHistory();

  }catch(e){
    area.innerHTML=`<div class="error-box">Could not generate outfits. Please check your internet connection and try again.<br><br><small>Error: ${e.message}</small></div><button style="width:100%;height:40px;font-size:13px;margin-top:8px" onclick="generateOutfits()">Try again</button>`;
  }
}

function renderOutfit(){
  if(!outfits.length) return;
  const area=document.getElementById('outfit-area');
  const o=outfits[outfitIdx];
  const pieces=(o.pieces||[]).map(name=>{
    const item=wardrobe.find(i=>i.name.toLowerCase()===name.toLowerCase())||wardrobe.find(i=>i.name.toLowerCase().includes(name.toLowerCase().split(' ')[0]))||null;
    return `<div class="piece"><div class="piece-img">${item?.img?`<img src="${item.img}" loading="lazy">`:`<span>${item?.emoji||'👕'}</span>`}</div><div class="piece-name">${name}</div></div>`;
  }).join('');
  const dots=outfits.map((_,i)=>`<span class="dot ${i===outfitIdx?'active':''}"></span>`).join('');
  area.innerHTML=`
    <div class="outfit-card">
      <div class="outfit-head"><span class="outfit-title">${o.title}</span><span class="outfit-score">Match: ${o.score}/10</span></div>
      <div class="outfit-pieces">${pieces}</div>
      <div class="outfit-reason">${o.reason}</div>
      <div class="outfit-nav"><div class="dot-row">${dots}</div><div class="nav-arrows"><button onclick="changeOutfit(-1)">←</button><button onclick="changeOutfit(1)">→</button></div></div>
    </div>
    <button class="worn-btn" onclick="markWorn()">Mark as worn today ✓</button>`;
}

function changeOutfit(d){outfitIdx=(outfitIdx+d+outfits.length)%outfits.length;renderOutfit();}

function markWorn(){
  if(!outfits.length) return;
  const today=new Date().toISOString().slice(0,10);
  outfits[outfitIdx].pieces.forEach(name=>{
    const item=wardrobe.find(i=>i.name.toLowerCase()===name.toLowerCase())||wardrobe.find(i=>i.name.toLowerCase().includes(name.toLowerCase().split(' ')[0]));
    if(item){if(!item.worn)item.worn=[];item.worn.push(today);}
  });
  saveWardrobe();toast('Outfit marked as worn!');
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){el.innerHTML='<div class="empty-state"><div class="big">📅</div>No outfit history yet.</div>';return;}
  el.innerHTML=history.map(h=>{
    const pieces=(h.outfit?.pieces||[]).slice(0,4).map(name=>{
      const item=wardrobe.find(i=>i.name.toLowerCase().includes((name||'').toLowerCase().split(' ')[0]));
      return `<div class="hist-thumb">${item?.img?`<img src="${item.img}">`:(item?.emoji||'👕')}</div>`;
    }).join('');
    return `<div class="history-item"><span class="hist-date">${h.date}</span><div class="hist-pieces">${pieces}</div><span class="hist-name">${h.outfit?.title||'Outfit'}</span></div>`;
  }).join('');
}

renderWardrobe();
</script>
